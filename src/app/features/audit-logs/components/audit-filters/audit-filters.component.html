<div class="audit-filters">
  <!-- Filter Header -->
  <div class="filters-header">
    <div class="filters-title">
      <i class="pi pi-filter"></i>
      <span>Filters</span>
      @if (hasActiveFilters()) {
        <span
          class="active-badge"
          pTooltip="{{ activeFilterCount() }} filter(s) currently applied"
          tooltipPosition="right"
        >
          {{ activeFilterCount() }}
        </span>
      }
    </div>
  </div>

  <form class="filters-form" [formGroup]="filterForm">
    <div class="filters-grid">
      <!-- Date Range Filter -->
      <div class="filter-field">
        <label for="dateRange">Date Range</label>
        <p-date-picker
          dateFormat="yy-mm-dd"
          formControlName="dateRange"
          inputId="dateRange"
          placeholder="Select date range"
          selectionMode="range"
          [showButtonBar]="true"
          [showIcon]="true"
        />
      </div>

      <!-- Action Type Filter -->
      <app-select
        id="actionType"
        label="Action Type"
        placeholder="All Actions"
        [control]="filterForm.controls.actionType"
        [options]="actionTypes()"
        [showClear]="true"
      />

      <!-- Entity Type Filter -->
      <app-select
        id="entityType"
        label="Entity Type"
        placeholder="All Entities"
        [control]="filterForm.controls.entityType"
        [options]="entityTypes()"
        [showClear]="true"
      />

      <!-- User ID Filter -->
      <div class="filter-field">
        <label for="userId">User ID</label>
        <input
          formControlName="userId"
          id="userId"
          pInputText
          placeholder="Enter user ID"
          type="text"
        />
      </div>

      <!-- Role Filter -->
      <app-select
        id="role"
        label="Role"
        placeholder="All Roles"
        [control]="filterForm.controls.role"
        [options]="roles()"
        [showClear]="true"
      />
    </div>

    <!-- Action Buttons -->
    <div class="filters-actions">
      <p-button
        icon="pi pi-times"
        label="Clear Filters"
        severity="secondary"
        tooltipPosition="top"
        [disabled]="!hasActiveFilters()"
        [outlined]="true"
        [pTooltip]="hasActiveFilters() ? 'Clear all ' + activeFilterCount() + ' active filter(s)' : 'No active filters'"
        (onClick)="onResetFilters()"
      />
      <p-button
        icon="pi pi-check"
        label="Apply Filters"
        pTooltip="Apply the selected filters"
        tooltipPosition="top"
        (onClick)="onApplyFilters()"
      />
    </div>
  </form>
</div>
