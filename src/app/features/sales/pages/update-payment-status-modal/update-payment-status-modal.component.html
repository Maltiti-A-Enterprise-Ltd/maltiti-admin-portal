<p-dialog
  header="Update Payment Status"
  [closable]="true"
  [modal]="true"
  [style]="{ width: '440px', maxWidth: '95vw' }"
  [visible]="visible()"
  (onHide)="close()"
>
  <form class="status-form" [formGroup]="form" (ngSubmit)="onSubmit()">

    <!-- Error banner -->
    @if (errorMessage()) {
      <div class="error-banner" role="alert">
        <i class="pi pi-exclamation-circle"></i>
        {{ errorMessage() }}
      </div>
    }

    <!-- New Status -->
    <div class="form-field">
      <label for="newStatus">New Status <span class="required">*</span></label>
      <p-select
        id="newStatus"
        optionLabel="label"
        optionValue="value"
        placeholder="Select status"
        [formControl]="form.controls.status"
        [options]="statusOptions"
      />
      @if (form.controls.status.invalid && form.controls.status.touched) {
        <small class="field-error">Please select a status.</small>
      }
    </div>

    <!-- Note / Reason -->
    <div class="form-field">
      <label for="statusNote">Note / Reason (optional)</label>
      <textarea
        id="statusNote"
        pTextarea
        placeholder="e.g. Payment confirmed via bank statement"
        rows="3"
        [formControl]="form.controls.note"
      ></textarea>
    </div>
  </form>

  <ng-template pTemplate="footer">
    <p-button
      label="Cancel"
      severity="secondary"
      [outlined]="true"
      (onClick)="close()"
    />
    <p-button
      icon="pi pi-check"
      label="Update Status"
      severity="primary"
      [loading]="loading()"
      (onClick)="onSubmit()"
    />
  </ng-template>
</p-dialog>
